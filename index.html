<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/brasil.png">
    <title>Logar no gov</title>
</head>
<body>
   <nav>
    <h1 class="logo">
        <span style="color:#285aaa;">g</span>
        <span style="color:#eec214;">o</span>
        <span style="color:#22972e;">v</span>
        <span style="color:#285aaa;">.</span>
        <span style="color:#285aaa;">b</span>
        <span style="color:#eec214;">r</span>
    </h1>
</nav>

    <form id="login-form" class="login-form">

        <h1>Entrar na conta </h1>

        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Digite seu email">
              <small id="erro-email" class="erro"></small>
        </div>

        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite sua senha">
               <small id="erro-senha" class="erro"></small>
        </div>

        <p>Não tem uma conta? <a href="">Criar conta</a></p>
        <button type="submit" id="submit">Entrar</button>

    </form>

    <footer class="footer">
  <p>Desenvolvido por <a href="https://github.com/Raul-de-Oliveira/">Raul de Oliveira</strong></p>
  
</footer>

    <script src="scripts/login.js"></script>
</body>
</html>
